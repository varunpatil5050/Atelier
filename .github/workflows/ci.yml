name: CI

# Polyglot monorepo CI (blueprint doc 13 §2): every push to main and every PR
# runs the same suites the project is verified with by hand — Go (race), Rust
# (clippy + tests), the TypeScript typecheck + unit suites, the web production
# build, and the Playwright multiplayer harness. Four jobs run in parallel.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go · build · vet · race tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod # single root module; installs the go.mod version (1.26)
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./... # covers relay, core-api, workspace-host, pkg/*, integration

  rust:
    name: Rust · clippy · tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/indexer
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/indexer
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  node:
    name: TypeScript · typecheck · unit tests · web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The doc-fs & conductor suites build and spawn the real relay, so this
      # job needs Go as well as Node.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v4 # reads the pinned pnpm version from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @atelier/protocol and @atelier/client are consumed via their built dist/
      # (no transpilePackages), so they must be built before anything downstream.
      - name: Build shared packages
        run: |
          pnpm --filter @atelier/protocol build
          pnpm --filter @atelier/client build
      - run: pnpm -r typecheck # every TS package (Go/Rust packages have no such script)
      - run: pnpm --filter @atelier/protocol test
      - run: pnpm --filter @atelier/doc-fs test
      - run: pnpm --filter @atelier/conductor test
      - run: pnpm --filter @atelier/web build

  e2e:
    name: E2E · multiplayer harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The Playwright webServer boots the relay via `go run` and builds/starts
      # the web app — so this job needs Go, Node, and browsers.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build shared packages
        run: |
          pnpm --filter @atelier/protocol build
          pnpm --filter @atelier/client build
      # Warm the Go build cache so the harness's `go run` relay starts well
      # within its 60s webServer timeout.
      - run: go build -o /tmp/relay-warm atelier.dev/services/collab-relay/cmd/collab-relay
      - name: Install Playwright browser
        run: pnpm --filter @atelier/web exec playwright install --with-deps chromium
      - run: pnpm --filter @atelier/web e2e
